services:
  ncentral-mcp:
    build: .
    container_name: nc-mcp-server
    # Loads all env vars from .env. NC_SERVER_URL / NC_JWT_TOKEN / MCP_API_KEY are required.
    env_file:
      - .env
    # Published on all host interfaces for LAN access. MCP_API_KEY MUST be set
    # (the /mcp endpoint is gated by it). Note /healthz and /metrics are
    # intentionally pre-auth, so keep this behind a trusted network / firewall.
    ports:
      - "0.0.0.0:3100:3100"
    environment:
      # Inside the container the listener must bind to all interfaces so the
      # host port mapping above can reach it. Host firewall + the bind on the
      # left of `ports:` is what controls external exposure.
      MCP_BIND_ADDRESS: 0.0.0.0
      MCP_PORT: 3100
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
